<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>Mavuno Farmer Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c2416; --ink-soft: #2e382a; --muted: #74705f; --muted-soft: #9a9584;
    --bg: #f4efe3; --bg-alt: #ede7d6; --paper: #fbf8ee;
    --line: #d9d2bd; --line-soft: #e6dfc9;
    --accent: #2e4d1f; --accent-soft: #4a6b37; --gold: #a17b2c; --clay: #a0542c; --bad: #8a2f24;
  }
  :root[data-theme="dark"] {
    --ink: #f2ece0; --ink-soft: #d9d3c4; --muted: #8e887c; --muted-soft: #6a6558;
    --bg: #14140f; --bg-alt: #1a1a14; --paper: #1c1b14;
    --line: #2d2b21; --line-soft: #242219;
    --accent: #c4d19c; --accent-soft: #a7b87a; --gold: #d4a656; --clay: #c87a52; --bad: #d07668;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Inter", sans-serif; font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; display: flex;
  }
  .display { font-family: "Fraunces", serif; }
  
  .sidebar {
    width: 280px; background: var(--paper); border-right: 1px solid var(--line);
    padding: 32px; display: flex; flex-direction: column; gap: 32px; overflow-y: auto;
  }
  .main { flex: 1; overflow-y: auto; padding: 48px; }
  
  .radar-card { background: var(--bg-alt); padding: 20px; border: 1px solid var(--line); border-radius: 4px; }
  .radar-card .label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 4px; display: block; }
  .radar-card .value { font-family: "Fraunces", serif; font-size: 28px; line-height: 1.1; }
  
  .farm-card { background: var(--paper); border: 1px solid var(--line); padding: 24px; border-radius: 4px; display: flex; flex-direction: column; gap: 16px; }
  .f-head { display: flex; justify-content: space-between; align-items: start; }
  .f-head h3 { font-family: "Fraunces", serif; font-size: 20px; margin: 0; }
  .spark-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .spark-box { background: var(--bg); padding: 8px; border-radius: 2px; }
  .spark-box span { font-size: 8px; text-transform: uppercase; color: var(--muted); display: block; }
  
  .badge { padding: 3px 8px; border-radius: 12px; font-size: 9px; font-weight: 600; text-transform: uppercase; }
  .b-excellent { background: rgba(46, 77, 31, 0.1); color: var(--accent); }
  .b-good { background: rgba(161, 123, 44, 0.1); color: var(--gold); }
  .b-poor { background: rgba(138, 47, 36, 0.1); color: var(--bad); }

  .btn { padding: 10px; border: 1px solid var(--ink); background: var(--ink); color: var(--paper); font-size: 10px; font-weight: 600; text-transform: uppercase; cursor: pointer; border-radius: 2px; }
  .btn:hover { opacity: 0.8; }
  
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper); padding: 12px 24px; border-radius: 2px; opacity: 0; transition: 300ms; z-index:9999; font-size:12px; text-transform:uppercase; letter-spacing:0.08em; font-weight:500;}
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="sidebar">
  <div>
    <div class="display" style="font-size: 24px; font-weight: 600;">Mavuno</div>
    <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted);">Farmer Dashboard</div>
  </div>

  <div class="radar-card">
    <span class="label">Farm ID</span>
    <div class="value" id="disp-farm-id" style="font-size: 16px;">—</div>
  </div>

  <div class="radar-card">
    <span class="label">Active Energy Balance</span>
    <div class="value" id="disp-bal">—</div>
    <span style="font-size:10px; color:var(--accent);">kWh remaining</span>
  </div>

  <div style="margin-top:auto;">
    <a href="/phone" style="text-decoration:none; color:var(--accent); font-weight:600; display:block; margin-bottom:12px;">📱 Field Simulator</a>
    <a href="/" style="text-decoration:none; color:var(--bad); font-weight:600; display:block;">← Logout</a>
  </div>
</div>

<div class="main">
  <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:40px; border-bottom: 1px solid var(--line); padding-bottom:20px;">
    <h1 class="display" style="font-size: 32px; margin:0;" id="welcome-msg">Welcome, Farmer</h1>
    <button class="btn" id="theme-toggle" style="border:none; font-size:16px; background:transparent;">🌙</button>
  </div>

  <div id="farm-content">Loading your farm data...</div>

  <div style="margin-top:40px; display:grid; grid-template-columns: 1fr 1fr; gap:40px;">
    <!-- Market Insights -->
    <div class="radar-card" style="background:var(--paper);">
      <span class="label">Live Market Price</span>
      <div id="market-insight" style="margin-top:16px;">Loading market data...</div>
    </div>

    <!-- Weather Forecast & Irrigation Planner -->
    <div class="radar-card" style="background:var(--paper);">
      <span class="label">Weather & Irrigation Planner</span>
      <div id="weather-planner" style="margin-top:16px;">Loading local forecast...</div>
    </div>

    <!-- AI Agronomist -->
    <div class="radar-card" style="background:var(--paper); grid-column: 1 / -1;">
      <span class="label">AI Agronomist Query</span>
      <textarea id="ask-q" style="width:100%; height:80px; margin:12px 0; padding:12px; border:1px solid var(--line); background:var(--bg); font-family:inherit;" placeholder="Ask Mavuno an agronomy question..."></textarea>
      <button class="btn" style="width:200px;" onclick="askMavuno()">Ask AI</button>
      <div id="ask-answer" style="margin-top:16px; font-style:italic; border-left:2px solid var(--accent); padding-left:12px;">Waiting for query...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const pathParts = window.location.pathname.split("/");
const farmId = pathParts[pathParts.length - 1];

function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  const btn = document.getElementById("theme-toggle");
  if (btn) btn.textContent = t === "dark" ? "☀️" : "🌙";
  localStorage.setItem("mavuno-theme", t);
}

function toast(msg) {
  const t = document.getElementById("toast");
  if(!t) return;
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

async function jget(url) { 
  try {
    const r = await fetch(url);
    if (!r.ok) return {error: "server_error"};
    return await r.json();
  } catch(e) { return {error: "network_error"}; }
}

async function jpost(url, body) {
  try {
    const res = await fetch(url, {
      method: "POST", 
      headers: {"Content-Type":"application/json"}, 
      body: JSON.stringify(body || {})
    });
    return await res.json();
  } catch(e) { return {error: "network_error"}; }
}

function nutrientSpark(series, color) {
  if (!series || !series.length) return "";
  const min = Math.min(...series), max = Math.max(...series);
  const rng = Math.max(max - min, 0.1);
  const pts = series.map((v, i) => `${(i*100)/(series.length-1)},${24-((v-min)/rng)*20}`).join(" ");
  return `<svg viewBox="0 0 100 24" preserveAspectRatio="none" style="width:100%; height:20px;"><polyline fill="none" stroke="${color}" stroke-width="2" points="${pts}"/></svg>`;
}

async function pingSensor() {
  toast("Pinging hardware sensor...");
  const payload = {
    farm_id: farmId,
    soil_moisture: (15 + Math.random() * 10).toFixed(2),
    temp_c: (28 + Math.random() * 6).toFixed(2),
    rainfall_mm: (0 + Math.random() * 2).toFixed(2),
    humidity_pct: (40 + Math.random() * 20).toFixed(2),
    n_mg_kg: (20 + Math.random() * 20).toFixed(2),
    p_mg_kg: (10 + Math.random() * 10).toFixed(2),
    k_mg_kg: (150 + Math.random() * 100).toFixed(2)
  };
  await jpost("/sensor/telemetry", payload);
  toast("Telemetry received! Updating dashboard...");
  loadData();
}

async function loadData() {
  document.getElementById("disp-farm-id").textContent = farmId;
  const farms = await jget("/farms");
  const farm = farms[farmId];
  if (!farm || farm.error) { document.getElementById("farm-content").innerHTML = "Farm data unavailable."; return; }

  document.getElementById("welcome-msg").textContent = `Welcome, ${farm.farmer_name}`;

  const score = await jget("/score/" + farmId);
  const bal = await jget("/ect/balance/" + farmId);
  
  document.getElementById("disp-bal").textContent = bal.kwh_remaining || 0;

  const hClass = `b-${(score.credit_health || "poor").toLowerCase()}`;
  document.getElementById("farm-content").innerHTML = `
    <div class="farm-card">
      <div class="f-head">
        <div><h3>${farm.farmer_name}</h3><span style="color:var(--muted); font-size:10px;">${farm.district} · ${farm.crop}</span></div>
        <span class="badge ${hClass}">${score.credit_health || "N/A"}</span>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <div class="display" style="font-size:32px;">${score.yps || 0}<span style="font-size:12px; color:var(--muted);">/1000</span></div>
        <div style="text-align:right;">
          <div style="font-weight:600; color:var(--accent);">${score.kwh_allocated || 0} kWh Cap</div>
        </div>
      </div>
      <div class="spark-row">
        <div class="spark-box"><span>Nitrogen</span>${nutrientSpark(score.nutrients?.n, "var(--accent)")}</div>
        <div class="spark-box"><span>Phos</span>${nutrientSpark(score.nutrients?.p, "var(--gold)")}</div>
        <div class="spark-box"><span>Potass</span>${nutrientSpark(score.nutrients?.k, "var(--clay)")}</div>
      </div>
      <div style="background:var(--bg); border:1px solid var(--line); border-radius:2px; padding:10px; font-size:10px; color:var(--ink-soft); line-height:1.4;">
        <strong style="color:var(--accent); text-transform:uppercase; letter-spacing:0.05em;">AI Diagnostic</strong><br>
        ${(score.diagnostics || []).join('<br>')}
      </div>
      <div style="margin-top:16px; border-top:1px solid var(--line); padding-top:16px;">
        <button class="btn" style="width:100%; border-color:var(--gold); color:var(--gold); background:transparent;" onclick="pingSensor()">Ping Hardware Sensor (Sync Data)</button>
      </div>
    </div>
  `;

  // Market Insights
  const priceRes = await jget(`/crp/prices?crop=${farm.crop}&region=${farm.district}`);
  if(priceRes.error) {
    document.getElementById("market-insight").innerHTML = "Price data unavailable.";
  } else {
    const arrow = priceRes.trend === "up" ? "↑" : priceRes.trend === "down" ? "↓" : "=";
    const color = priceRes.trend === "up" ? "var(--accent)" : priceRes.trend === "down" ? "var(--bad)" : "var(--muted)";
    document.getElementById("market-insight").innerHTML = `
      <div class="display" style="font-size:36px; color:var(--ink); margin: 12px 0;">UGX ${priceRes.today.ugx.toLocaleString()}<span style="font-size:14px; color:var(--muted); font-family:'Inter', sans-serif;"> / ${priceRes.unit}</span></div>
      <div style="font-size:12px; color:var(--muted); font-family:'JetBrains Mono', monospace;">
        7d Avg: UGX ${priceRes.last7_avg.toLocaleString()} <strong style="color:${color}; font-size:14px;">${arrow}</strong>
      </div>
      <p style="font-size:12px; color:var(--muted); margin-top:16px;">Institutional floor price in your region.</p>
    `;
  }

  // Weather Planner
  const rainProb = Math.floor(Math.random() * 40);
  const suggestIrrigation = rainProb < 20;
  document.getElementById("weather-planner").innerHTML = `
    <div style="display:flex; justify-content:space-between; margin-bottom:24px; text-align:center;">
      <div><div style="font-size:11px; color:var(--muted);">Tomorrow</div><div style="font-family:'Fraunces',serif; font-size:28px;">31°C ☀️</div><div style="font-size:12px;">${rainProb}% Rain</div></div>
      <div><div style="font-size:11px; color:var(--muted);">Day 2</div><div style="font-family:'Fraunces',serif; font-size:28px;">29°C ⛅</div><div style="font-size:12px;">${rainProb+15}% Rain</div></div>
      <div><div style="font-size:11px; color:var(--muted);">Day 3</div><div style="font-family:'Fraunces',serif; font-size:28px;">27°C 🌧️</div><div style="font-size:12px;">${rainProb+40}% Rain</div></div>
    </div>
    <div style="background:${suggestIrrigation ? 'rgba(161, 123, 44, 0.1)' : 'rgba(46, 77, 31, 0.1)'}; padding:14px; border-radius:2px; border:1px solid ${suggestIrrigation ? 'var(--gold)' : 'var(--accent)'}; font-size:12px;">
      <strong style="color:${suggestIrrigation ? 'var(--gold)' : 'var(--accent)'};">Action Plan:</strong><br>
      <span style="color:var(--ink-soft); display:block; margin-top:6px;">${suggestIrrigation ? "Low rain expected. Recommend using Energy Credit for morning irrigation." : "Rain expected soon. Preserve Energy Credit."}</span>
    </div>
  `;
}

async function askMavuno() {
  const q = document.getElementById("ask-q").value;
  if (!q.trim()) return toast("Please enter a question.");
  document.getElementById("ask-answer").innerHTML = '<span style="color:var(--muted); font-style:italic;">AI is thinking...</span>';
  try {
      const r = await jpost("/crp/ask", {farm_id: farmId, question: q});
      if(r.error) {
          document.getElementById("ask-answer").textContent = "Error: " + r.error;
      } else {
          document.getElementById("ask-answer").innerHTML = `"${r.answer}"<br><span style="font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted-soft); margin-top:8px; display:block;">Source: ${r.source}</span>`;
      }
  } catch(e) {
      document.getElementById("ask-answer").textContent = "Network error connecting to AI.";
  }
}

document.addEventListener("DOMContentLoaded", () => {
  applyTheme(localStorage.getItem("mavuno-theme") || "light");
  const btn = document.getElementById("theme-toggle");
  if (btn) {
    btn.onclick = () => {
      const cur = document.documentElement.getAttribute("data-theme");
      applyTheme(cur === "dark" ? "light" : "dark");
    };
  }
  loadData();
});
</script>
</body>
</html>
