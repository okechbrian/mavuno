<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>Mavuno Logistics Hub</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c2416; --ink-soft: #2e382a; --muted: #74705f; --muted-soft: #9a9584;
    --bg: #f4efe3; --bg-alt: #ede7d6; --paper: #fbf8ee;
    --line: #d9d2bd; --line-soft: #e6dfc9;
    --accent: #a0542c; --accent-soft: #c87a52; --gold: #a17b2c; --bad: #8a2f24;
  }
  :root[data-theme="dark"] {
    --ink: #f2ece0; --ink-soft: #d9d3c4; --muted: #8e887c; --muted-soft: #6a6558;
    --bg: #14140f; --bg-alt: #1a1a14; --paper: #1c1b14;
    --line: #2d2b21; --line-soft: #242219;
    --accent: #c87a52; --accent-soft: #d4a656; --gold: #d4a656; --bad: #d07668;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Inter", sans-serif; font-size: 13px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; display: flex;
  }
  .display { font-family: "Fraunces", serif; }
  
  .sidebar {
    width: 280px; background: var(--paper); border-right: 1px solid var(--line);
    padding: 32px; display: flex; flex-direction: column; gap: 32px; overflow-y: auto;
  }
  .main { flex: 1; overflow-y: auto; padding: 48px; }
  
  .route-card {
    background: var(--paper); border: 1px solid var(--line); padding: 20px; border-radius: 4px;
    margin-bottom: 16px; display: flex; flex-direction: column; gap: 12px;
  }
  .r-head { display: flex; justify-content: space-between; align-items: center; }
  .status-pill { padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
  .s-pending { background: var(--bg-alt); color: var(--muted); }
  .s-active { background: rgba(160, 84, 44, 0.1); color: var(--accent); }
  
  .btn {
    padding: 10px 16px; border: 1px solid var(--ink); background: var(--ink); color: var(--paper);
    font-size: 10px; font-weight: 600; text-transform: uppercase; cursor: pointer; border-radius: 2px;
  }
  .btn:hover { opacity: 0.8; }
</style>
</head>
<body>

<div class="sidebar">
  <div>
    <div class="display" style="font-size: 24px; font-weight: 600;">Mavuno</div>
    <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted);">Logistics Hub</div>
  </div>

  <div class="radar-card" style="background:var(--bg-alt); padding:20px; border:1px solid var(--line);">
    <span style="font-size:9px; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:4px;">Pending Collections</span>
    <div class="display" style="font-size:32px;" id="pending-count">0</div>
  </div>

  <div style="margin-top:auto;">
    <a href="/logout" style="text-decoration:none; color:var(--bad); font-weight:600; display:block;">← Logout</a>
  </div>
</div>

<div class="main">
  <h1 class="display" style="font-size: 32px; margin:0 0 40px 0;">Bulk Logistics Coordination</h1>
  
  <div id="routes-container">
    <div style="padding:40px; text-align:center; color:var(--muted); border:1px dashed var(--line); border-radius:4px;">
      No active routes. Settlements in the marketplace will appear here for coordination.
    </div>
  </div>
</div>

<script>
async function jget(url) {
  const r = await fetch(url);
  return r.json();
}

async function loadRoutes() {
  const res = await jget("/ledger");
  const settled = res.rows.filter(r => r.entry.type === "PAYMENT_CONFIRMED" && r.entry.payload.status === "settled");
  
  const container = document.getElementById("routes-container");
  document.getElementById("pending-count").textContent = settled.length;

  if (settled.length > 0) {
    container.innerHTML = settled.map(r => `
      <div class="route-card">
        <div class="r-head">
          <strong style="font-size:14px;">Collection: ${r.entry.payload.payment_id}</strong>
          <span class="status-pill s-active">Awaiting Dispatch</span>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; font-size:11px;">
          <div>
            <span style="color:var(--muted); text-transform:uppercase; font-size:9px;">Source Farm</span><br>
            <strong>${r.entry.payload.farm_id}</strong>
          </div>
          <div>
            <span style="color:var(--muted); text-transform:uppercase; font-size:9px;">Settled At</span><br>
            <strong>${new Date(r.entry.ts*1000).toLocaleString()}</strong>
          </div>
        </div>
        <button class="btn">Assign Driver</button>
      </div>
    `).join("");
  }
}

loadRoutes();
setInterval(loadRoutes, 10000);
</script>

</body>
</html>
