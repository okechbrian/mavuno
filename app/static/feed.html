<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>Mavuno Social</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c2416; --ink-soft: #2e382a; --muted: #74705f; --muted-soft: #9a9584;
    --bg: #f4efe3; --bg-alt: #ede7d6; --paper: #fbf8ee;
    --line: #d9d2bd; --line-soft: #e6dfc9;
    --accent: #2e4d1f; --accent-soft: #4a6b37; --gold: #a17b2c; --clay: #a0542c; --bad: #8a2f24;
  }
  :root[data-theme="dark"] {
    --ink: #f2ece0; --ink-soft: #d9d3c4; --muted: #8e887c; --muted-soft: #6a6558;
    --bg: #14140f; --bg-alt: #1a1a14; --paper: #1c1b14;
    --line: #2d2b21; --line-soft: #242219;
    --accent: #c4d19c; --accent-soft: #a7b87a; --gold: #d4a656; --clay: #c87a52; --bad: #d07668;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Inter", sans-serif; font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }
  .display { font-family: "Fraunces", serif; }

  .wrap { max-width: 720px; margin: 0 auto; padding: 28px 20px 80px; }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--line); padding-bottom: 16px; margin-bottom: 24px;
    flex-wrap: wrap; gap: 12px;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand h1 { font-family: "Fraunces", serif; font-size: 28px; margin: 0; }
  .brand .sub { font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); }
  .topbar-right { display: flex; gap: 8px; align-items: center; }
  .link-btn {
    text-decoration: none; color: var(--ink); border: 1px solid var(--line);
    padding: 8px 14px; border-radius: 999px; font-size: 12px; background: var(--paper);
  }
  .link-btn:hover { background: var(--bg-alt); }

  .card {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 4px; padding: 20px; margin-bottom: 18px;
  }
  .composer textarea {
    width: 100%; min-height: 80px; border: 1px solid var(--line);
    background: var(--bg-alt); color: var(--ink);
    -webkit-text-fill-color: var(--ink); caret-color: var(--ink);
    border-radius: 4px; padding: 10px 12px; font-family: inherit; font-size: 14px; resize: vertical;
  }
  .composer-foot {
    display: flex; justify-content: space-between; align-items: center; margin-top: 10px; gap: 10px;
  }
  .counter { font-size: 11px; color: var(--muted); font-family: "JetBrains Mono", monospace; }
  .btn {
    padding: 10px 18px; border: 1px solid var(--ink); background: var(--ink); color: var(--paper);
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
    cursor: pointer; border-radius: 2px;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .post { display: flex; flex-direction: column; gap: 10px; }
  .post-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: var(--paper);
    display: flex; align-items: center; justify-content: center; font-weight: 600;
    font-family: "Fraunces", serif;
  }
  .post-name { font-weight: 600; }
  .post-meta { color: var(--muted); font-size: 11px; }
  .chip {
    display: inline-block; padding: 2px 8px; border-radius: 999px;
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .chip-district { background: rgba(46,77,31,0.12); color: var(--accent); }
  .chip-crop     { background: rgba(161,123,44,0.15); color: var(--gold); }
  .post-body { font-size: 14px; line-height: 1.55; white-space: pre-wrap; word-wrap: break-word; }
  .reactions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
  .react-btn {
    border: 1px solid var(--line); background: var(--bg-alt); color: var(--ink);
    padding: 6px 10px; border-radius: 999px; cursor: pointer; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .react-btn:hover { background: var(--paper); border-color: var(--accent); }
  .react-btn .count { font-size: 11px; color: var(--muted); font-family: "JetBrains Mono", monospace; }
  .flag-btn {
    border: none; background: transparent; color: var(--muted); cursor: pointer;
    font-size: 13px; margin-left: auto; padding: 6px 8px;
  }
  .flag-btn:hover { color: var(--bad); }

  .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-style: italic; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper); padding: 12px 24px; border-radius: 2px;
    opacity: 0; transition: 300ms; z-index: 9999;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .toast.show { opacity: 1; }

  .theme-toggle {
    border: none; background: transparent; font-size: 18px; cursor: pointer;
    padding: 8px 10px; color: var(--ink);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <h1>🌾 Mavuno Social</h1>
      <span class="sub">Field updates from farmers</span>
    </div>
    <div class="topbar-right">
      <a href="/" class="link-btn">← Dashboard</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>
    </div>
  </div>

  <div class="card composer" id="composer" style="display:none;">
    <div style="font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:8px;">Post an update</div>
    <textarea id="post-body" maxlength="300" placeholder="Share a harvest, a field note, or a question for buyers…"></textarea>
    <div class="composer-foot">
      <span class="counter"><span id="post-counter">0</span> / 300</span>
      <button class="btn" id="post-submit" onclick="submitPost()">Post</button>
    </div>
  </div>

  <div id="feed-list"><div class="empty">Loading feed…</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const EMOJI_SET = ["🌱","🔥","❤️","👏"];
let me = null;

function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  const btn = document.getElementById("theme-toggle");
  if (btn) btn.textContent = t === "dark" ? "☀️" : "🌙";
  localStorage.setItem("mavuno-theme", t);
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

async function jget(url) {
  try {
    const r = await fetch(url, { credentials: "same-origin" });
    if (r.status === 401) { window.location.href = "/"; return {error:"unauthorized"}; }
    if (!r.ok) return {error:"server_error", status:r.status};
    return await r.json();
  } catch(e) { return {error:"network_error"}; }
}

async function jpost(url, body) {
  try {
    const r = await fetch(url, {
      method:"POST", credentials:"same-origin",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(body || {}),
    });
    if (r.status === 401) { window.location.href = "/"; return {error:"unauthorized"}; }
    return await r.json();
  } catch(e) { return {error:"network_error"}; }
}

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function relTime(ts) {
  const s = Math.max(0, Math.floor(Date.now()/1000 - Number(ts || 0)));
  if (s < 60) return s + "s ago";
  if (s < 3600) return Math.floor(s/60) + "m ago";
  if (s < 86400) return Math.floor(s/3600) + "h ago";
  return Math.floor(s/86400) + "d ago";
}

function initials(name) {
  if (!name) return "?";
  return name.trim().split(/\s+/).map(w => w[0]).slice(0,2).join("").toUpperCase();
}

function renderPost(p) {
  const emojiRow = EMOJI_SET.map(e => {
    const n = (p.reactions && p.reactions[e]) || 0;
    return `<button class="react-btn" data-pid="${p.id}" data-emoji="${e}" onclick="reactTo('${p.id}', '${e}')">${e}${n ? `<span class="count">${n}</span>` : ""}</button>`;
  }).join("");
  return `
    <div class="card post" id="post-${p.id}">
      <div class="post-head">
        <div class="avatar">${escapeHtml(initials(p.farmer_name))}</div>
        <div>
          <div class="post-name">${escapeHtml(p.farmer_name || p.farm_id)}</div>
          <div class="post-meta">
            ${p.district ? `<span class="chip chip-district">${escapeHtml(p.district)}</span>` : ""}
            ${p.crop ? `<span class="chip chip-crop">${escapeHtml(p.crop)}</span>` : ""}
            <span> · ${relTime(p.created_at)}</span>
          </div>
        </div>
      </div>
      <div class="post-body">${escapeHtml(p.body)}</div>
      <div class="reactions">
        ${emojiRow}
        <button class="flag-btn" title="Report this post" onclick="flagPost('${p.id}')">🚩</button>
      </div>
    </div>
  `;
}

async function loadMe() {
  const r = await jget("/me");
  if (r && !r.error) me = r;
  // Farmers get the composer.
  if (me && me.role === "farmer") {
    document.getElementById("composer").style.display = "block";
  }
}

async function loadFeed() {
  const list = document.getElementById("feed-list");
  const res = await jget("/feed?limit=50");
  if (res.error) {
    list.innerHTML = '<div class="empty">Could not load the feed.</div>';
    return;
  }
  const posts = res.posts || [];
  if (!posts.length) {
    list.innerHTML = '<div class="empty">No posts yet. Farmers — share the first update!</div>';
    return;
  }
  list.innerHTML = posts.map(renderPost).join("");
}

async function submitPost() {
  const ta = document.getElementById("post-body");
  const body = (ta.value || "").trim();
  if (!body) { toast("Write something first."); return; }
  const btn = document.getElementById("post-submit");
  btn.disabled = true;
  const res = await jpost("/feed", { body });
  btn.disabled = false;
  if (res.error) {
    if (res.error === "banned_word") toast("That word isn't allowed.");
    else if (res.error === "body_too_long") toast("Too long — keep it under 300 chars.");
    else toast("Could not post: " + res.error);
    return;
  }
  ta.value = "";
  document.getElementById("post-counter").textContent = "0";
  toast("Posted!");
  loadFeed();
}

async function reactTo(postId, emoji) {
  if (!me || (me.role !== "farmer" && me.role !== "buyer")) {
    toast("Sign in as a farmer or buyer to react.");
    return;
  }
  // Optimistic bump.
  const btn = document.querySelector(`.react-btn[data-pid="${postId}"][data-emoji="${emoji}"]`);
  const res = await jpost(`/feed/${postId}/react`, { emoji });
  if (res.error) {
    toast("Could not react: " + res.error);
    return;
  }
  // Re-fetch to stay consistent with server-side dedupe.
  const p = await jget(`/feed/${postId}`);
  if (!p.error) {
    const card = document.getElementById(`post-${postId}`);
    if (card) card.outerHTML = renderPost(p);
  }
}

async function flagPost(postId) {
  if (!confirm("Report this post? It will be hidden from the feed.")) return;
  const res = await jpost(`/feed/${postId}/flag`, {});
  if (res.error) { toast("Could not flag: " + res.error); return; }
  const card = document.getElementById(`post-${postId}`);
  if (card) {
    card.style.transition = "opacity 300ms";
    card.style.opacity = "0";
    setTimeout(() => card.remove(), 320);
  }
  toast("Thanks — post hidden.");
}

document.addEventListener("DOMContentLoaded", async () => {
  applyTheme(localStorage.getItem("mavuno-theme") || "light");
  const tbtn = document.getElementById("theme-toggle");
  if (tbtn) tbtn.onclick = () => {
    const cur = document.documentElement.getAttribute("data-theme");
    applyTheme(cur === "dark" ? "light" : "dark");
  };
  const ta = document.getElementById("post-body");
  const counter = document.getElementById("post-counter");
  if (ta) ta.addEventListener("input", () => { counter.textContent = ta.value.length; });
  await loadMe();
  await loadFeed();
});
</script>
</body>
</html>
