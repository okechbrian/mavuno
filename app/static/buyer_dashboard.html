<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>Mavuno Buyer Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c2416; --ink-soft: #2e382a; --muted: #74705f; --muted-soft: #9a9584;
    --bg: #f4efe3; --bg-alt: #ede7d6; --paper: #fbf8ee;
    --line: #d9d2bd; --line-soft: #e6dfc9;
    --accent: #2e4d1f; --accent-soft: #4a6b37; --gold: #a17b2c; --clay: #a0542c; --bad: #8a2f24;
  }
  :root[data-theme="dark"] {
    --ink: #f2ece0; --ink-soft: #d9d3c4; --muted: #8e887c; --muted-soft: #6a6558;
    --bg: #14140f; --bg-alt: #1a1a14; --paper: #1c1b14;
    --line: #2d2b21; --line-soft: #242219;
    --accent: #c4d19c; --accent-soft: #a7b87a; --gold: #d4a656; --clay: #c87a52; --bad: #d07668;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: "Inter", sans-serif; font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; display: flex;
  }
  .display { font-family: "Fraunces", serif; }
  
  .sidebar {
    width: 280px; background: var(--paper); border-right: 1px solid var(--line);
    padding: 32px; display: flex; flex-direction: column; gap: 32px; overflow-y: auto;
  }
  .main { flex: 1; overflow-y: auto; padding: 48px; }
  
  .radar-card { background: var(--bg-alt); padding: 20px; border: 1px solid var(--line); border-radius: 4px; }
  .radar-card .label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 4px; display: block; }
  .radar-card .value { font-family: "Fraunces", serif; font-size: 28px; line-height: 1.1; }
  
  .offer-card { background: var(--paper); border: 1px solid var(--line); padding: 24px; border-radius: 4px; display: flex; flex-direction: column; gap: 16px; margin-bottom: 16px; }
  .o-head { display: flex; justify-content: space-between; align-items: start; }
  .o-head h3 { font-family: "Fraunces", serif; font-size: 20px; margin: 0; }
  
  .btn { padding: 10px; border: 1px solid var(--ink); background: var(--ink); color: var(--paper); font-size: 10px; font-weight: 600; text-transform: uppercase; cursor: pointer; border-radius: 2px; }
  .btn:hover { opacity: 0.8; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .chip { padding: 6px 14px; border: 1px solid var(--line); border-radius: 999px; background: var(--paper); font-size: 11px; cursor: pointer; color: var(--ink); user-select: none; }
  .chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .badge { display: inline-block; padding: 2px 8px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; border-radius: 999px; margin-left: 8px; vertical-align: middle; }
  .badge-match { background: var(--accent); color: var(--paper); }
  .badge-partial { background: var(--gold); color: var(--paper); }
  .badge-pending { background: var(--clay); color: var(--paper); }
  .badge-settled { background: var(--accent-soft); color: var(--paper); }

  .pay-panel { background: var(--bg-alt); padding: 16px; border: 1px solid var(--line); border-radius: 4px; margin-top: 12px; }
  .pay-panel label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px; }
  .pay-panel input { width: 100%; padding: 10px; border: 1px solid var(--line); background: var(--paper); color: var(--ink); -webkit-text-fill-color: var(--ink); caret-color: var(--ink); border-radius: 2px; font-size: 14px; font-family: inherit; }
  .pay-status { font-size: 12px; color: var(--muted); margin-top: 8px; font-family: 'JetBrains Mono', monospace; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper); padding: 12px 20px; border-radius: 4px;
    font-size: 13px; opacity: 0; transition: opacity 0.2s; z-index: 200; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .nav-toggle { display: none; }
  .backdrop { display: none; }

  /* Topbar chips (Messages + Social) */
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .topbar-btn {
    position: relative; padding: 8px 14px; border: 1px solid var(--line);
    background: var(--paper); color: var(--ink); border-radius: 999px;
    font-size: 12px; cursor: pointer; text-decoration: none; display: inline-flex;
    align-items: center; gap: 6px;
  }
  .topbar-btn:hover { background: var(--bg-alt); }
  .unread-dot {
    display: none; background: var(--bad); color: var(--paper);
    border-radius: 999px; padding: 1px 7px; font-size: 10px; font-weight: 600;
    margin-left: 4px; min-width: 16px; text-align: center;
  }
  .unread-dot.on { display: inline-block; }

  /* Chat drawer */
  .chat-drawer {
    position: fixed; top: 0; right: 0; height: 100vh; width: 420px; max-width: 90vw;
    background: var(--paper); border-left: 1px solid var(--line);
    box-shadow: -8px 0 32px rgba(0,0,0,0.08);
    transform: translateX(100%); transition: transform 0.22s ease; z-index: 150;
    display: flex; flex-direction: column;
  }
  .chat-drawer.open { transform: translateX(0); }
  .chat-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 20px; border-bottom: 1px solid var(--line);
  }
  .chat-head h3 { margin: 0; font-family: "Fraunces", serif; font-size: 18px; }
  .chat-close {
    border: none; background: transparent; font-size: 20px; cursor: pointer;
    color: var(--ink); padding: 4px 8px;
  }
  .chat-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .chat-foot { border-top: 1px solid var(--line); padding: 12px 16px; display: flex; gap: 8px; }
  .chat-foot textarea {
    flex: 1; resize: none; padding: 10px; border: 1px solid var(--line);
    background: var(--bg-alt); color: var(--ink); -webkit-text-fill-color: var(--ink);
    caret-color: var(--ink); border-radius: 4px; font-family: inherit; font-size: 13px;
    min-height: 44px; max-height: 100px;
  }
  .chat-thread-row {
    padding: 12px; border: 1px solid var(--line); border-radius: 4px;
    background: var(--bg-alt); margin-bottom: 10px; cursor: pointer;
  }
  .chat-thread-row:hover { background: var(--paper); }
  .chat-thread-row .ct-name { font-weight: 600; font-size: 13px; }
  .chat-thread-row .ct-preview { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .chat-thread-row .ct-unread {
    display: inline-block; background: var(--bad); color: var(--paper);
    border-radius: 999px; padding: 0 8px; font-size: 10px; font-weight: 600;
    margin-left: 6px;
  }
  .chat-bubble {
    max-width: 78%; padding: 10px 14px; border-radius: 14px;
    margin-bottom: 8px; font-size: 13px; line-height: 1.4; word-wrap: break-word;
  }
  .chat-bubble-farmer { background: var(--accent); color: var(--paper); align-self: flex-start; }
  .chat-bubble-buyer  { background: var(--gold);   color: var(--paper); align-self: flex-end; margin-left: auto; }
  .chat-bubble .b-meta { font-size: 9px; opacity: 0.75; margin-top: 4px; letter-spacing: 0.04em; }
  .chat-convo-flex { display: flex; flex-direction: column; }
  .chat-back {
    background: transparent; border: 1px solid var(--line); padding: 4px 10px;
    font-size: 11px; color: var(--ink); cursor: pointer; border-radius: 4px; margin-bottom: 12px;
  }
  @media (max-width: 768px) {
    .chat-drawer { width: 100%; max-width: 100%; }
  }

  @media (max-width: 768px) {
    html, body { overflow: auto; height: auto; }
    body { display: block; }
    .sidebar {
      position: fixed; top: 0; left: 0; height: 100vh; width: 80%; max-width: 320px;
      transform: translateX(-100%); transition: transform 0.25s ease; z-index: 100;
      padding: 24px;
    }
    .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.2); }
    .main { padding: 16px; }
    .nav-toggle {
      display: flex; align-items: center; justify-content: center;
      position: sticky; top: 0; z-index: 50; width: 44px; height: 44px;
      background: var(--paper); border: 1px solid var(--line); border-radius: 4px;
      font-size: 20px; cursor: pointer; color: var(--ink); margin-bottom: 12px;
    }
    .backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 90;
    }
    .backdrop.open { display: block; }
    .o-head { flex-direction: column; gap: 8px; }
    .o-head > div:last-child { text-align: left !important; }
    .offer-card { padding: 16px; }
    h1.display { font-size: 24px !important; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div>
    <div class="display" style="font-size: 24px; font-weight: 600;">Mavuno</div>
    <div style="font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted);">Buyer Dashboard</div>
  </div>

  <div class="radar-card">
    <span class="label">Buyer Name</span>
    <div class="value" id="disp-buyer-name" style="font-size: 18px;">—</div>
  </div>

  <div class="radar-card">
    <span class="label">Region & Floor Price</span>
    <div class="value" id="disp-region" style="font-size: 16px;">—</div>
  </div>

  <div class="radar-card" style="background:var(--paper);">
    <span class="label">Market Trends</span>
    <div id="disp-trends" style="margin-top:8px;">Loading trends...</div>
  </div>

  <div style="margin-top:auto;">
    <a href="/phone" style="text-decoration:none; color:var(--accent); font-weight:600; display:block; margin-bottom:12px;">📱 Field Simulator</a>
    <a href="/logout" style="text-decoration:none; color:var(--bad); font-weight:600; display:block;">← Logout</a>
  </div>
</div>

<div class="backdrop" id="backdrop"></div>

<div class="main">
  <button class="nav-toggle" id="nav-toggle" aria-label="Open menu">☰</button>
  <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:24px; border-bottom: 1px solid var(--line); padding-bottom:20px; gap:12px; flex-wrap:wrap;">
    <div>
      <h1 class="display" style="font-size: 32px; margin:0;">Live Marketplace</h1>
      <div id="market-summary" style="font-size:11px; color:var(--muted); margin-top:4px;">Loading...</div>
    </div>
    <div class="topbar-actions">
      <a href="/feed-page" class="topbar-btn" title="Public feed">🌾 Mavuno Social</a>
      <button class="topbar-btn" id="messages-btn" onclick="openChat()" title="Open messages">💬 Messages<span class="unread-dot" id="msg-unread">0</span></button>
      <button class="btn" id="theme-toggle" style="border:none; font-size:16px; background:transparent;">🌙</button>
    </div>
  </div>

  <div class="chips" id="filter-chips"></div>

  <div id="offers-content">Loading live offers...</div>
</div>
<div class="toast" id="toast"></div>

<div class="chat-drawer" id="chat-drawer" aria-hidden="true">
  <div class="chat-head">
    <h3 id="chat-title">Messages</h3>
    <button class="chat-close" onclick="closeChat()" aria-label="Close">✕</button>
  </div>
  <div class="chat-body" id="chat-body"></div>
  <div class="chat-foot" id="chat-foot" style="display:none;">
    <textarea id="chat-input" maxlength="500" placeholder="Ask the farmer a question…"></textarea>
    <button class="btn" style="background:var(--accent); border-color:var(--accent);" onclick="sendChat()">Send</button>
  </div>
</div>

<script>
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  const btn = document.getElementById("theme-toggle");
  if (btn) btn.textContent = t === "dark" ? "☀️" : "🌙";
  localStorage.setItem("mavuno-theme", t);
}

document.addEventListener("DOMContentLoaded", () => {
  applyTheme(localStorage.getItem("mavuno-theme") || "light");
  const btn = document.getElementById("theme-toggle");
  if (btn) {
    btn.onclick = () => {
      const cur = document.documentElement.getAttribute("data-theme");
      applyTheme(cur === "dark" ? "light" : "dark");
    };
  }
  loadData();
});

const pathParts = window.location.pathname.split("/");
const buyerId = pathParts[pathParts.length - 1];

function _onAuthFail() { window.location.href = "/"; }

async function jget(url) {
  try {
    const r = await fetch(url, { credentials: "same-origin" });
    if (r.status === 401) { _onAuthFail(); return {error: "unauthorized"}; }
    if (!r.ok) return {error: "server_error"};
    return await r.json();
  } catch(e) { return {error: "network_error"}; }
}

async function jpost(url, body) {
  try {
    const res = await fetch(url, {
      method: "POST",
      credentials: "same-origin",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(body || {})
    });
    if (res.status === 401) { _onAuthFail(); return {error: "unauthorized"}; }
    return await res.json();
  } catch(e) { return {error: "network_error"}; }
}

function openSidebar() {
  document.querySelector(".sidebar").classList.add("open");
  document.getElementById("backdrop").classList.add("open");
}
function closeSidebar() {
  document.querySelector(".sidebar").classList.remove("open");
  document.getElementById("backdrop").classList.remove("open");
}
document.addEventListener("DOMContentLoaded", () => {
  const toggle = document.getElementById("nav-toggle");
  const backdrop = document.getElementById("backdrop");
  if (toggle) toggle.onclick = openSidebar;
  if (backdrop) backdrop.onclick = closeSidebar;
});

let currentBuyer = null;

async function loadData() {
  const buyers = await jget("/buyers");
  if (!buyers || buyers.error) { document.getElementById("offers-content").innerHTML = "Error loading buyers."; return; }
  currentBuyer = buyers.find(b => b.id === buyerId);
  
  if (!currentBuyer) {
    document.getElementById("offers-content").innerHTML = "Buyer not found.";
    return;
  }

  document.getElementById("disp-buyer-name").textContent = currentBuyer.name;
  document.getElementById("disp-region").innerHTML = `${currentBuyer.region}<br><span style="font-size:12px; color:var(--muted);">UGX ${currentBuyer.floor_ugx} / kg</span>`;
  renderChips();

  const trendsDiv = document.getElementById("disp-trends");
  if(trendsDiv) {
    let trendsHtml = '';
    for(let c of currentBuyer.crops) {
      const p = await jget(`/crp/prices?crop=${c}&region=${currentBuyer.region}`);
      if(!p.error) {
        const arrow = p.trend === "up" ? "↑" : p.trend === "down" ? "↓" : "=";
        const color = p.trend === "up" ? "var(--accent)" : p.trend === "down" ? "var(--bad)" : "var(--muted)";
        trendsHtml += `
          <div style="margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--line-soft);">
            <div style="font-size:11px; text-transform:uppercase; color:var(--ink); font-weight:600;">${c}</div>
            <div style="font-family:'Fraunces', serif; font-size:20px;">UGX ${p.today.ugx.toLocaleString()}</div>
            <div style="font-size:10px; color:var(--muted); font-family:'JetBrains Mono', monospace;">
              7d Avg: UGX ${p.last7_avg.toLocaleString()} <strong style="color:${color}; font-size:12px;">${arrow}</strong>
            </div>
          </div>
        `;
      }
    }
    trendsDiv.innerHTML = trendsHtml || "No data available";
  }

  loadOffers();
}

// Filter state, persisted in URL so views are shareable.
const filterState = {
  region: false,    // limit to buyer's region
  crops: false,     // limit to buyer's crops
  budget: false,    // floor_ugx <= buyer's floor
};

function readFiltersFromUrl() {
  const u = new URLSearchParams(window.location.search);
  filterState.region = u.get("region") === "1";
  filterState.crops  = u.get("crops")  === "1";
  filterState.budget = u.get("budget") === "1";
}
function writeFiltersToUrl() {
  const u = new URLSearchParams();
  if (filterState.region) u.set("region", "1");
  if (filterState.crops)  u.set("crops",  "1");
  if (filterState.budget) u.set("budget", "1");
  const q = u.toString();
  history.replaceState(null, "", window.location.pathname + (q ? "?" + q : ""));
}
function toggleChip(name) {
  filterState[name] = !filterState[name];
  writeFiltersToUrl();
  renderChips();
  renderOffers(_lastOffers);
}
function renderChips() {
  const c = document.getElementById("filter-chips");
  c.innerHTML = `
    <span class="chip ${filterState.region ? 'on' : ''}" onclick="toggleChip('region')">My region (${currentBuyer.region})</span>
    <span class="chip ${filterState.crops  ? 'on' : ''}" onclick="toggleChip('crops')">My crops</span>
    <span class="chip ${filterState.budget ? 'on' : ''}" onclick="toggleChip('budget')">Within budget (≤ UGX ${currentBuyer.floor_ugx.toLocaleString()})</span>
  `;
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), 3200);
}

let _lastOffers = [];

async function loadOffers() {
  if (!currentBuyer) return;
  const res = await jget("/crp/offers?limit=100");
  const offers = res.offers || [];
  _lastOffers = offers;
  renderOffers(offers);
}

function scoreOffer(o) {
  // Higher score = better match. Used for sort.
  const regionMatch = o.region === currentBuyer.region;
  const cropMatch   = currentBuyer.crops.includes((o.crop || "").toLowerCase());
  const priceMatch  = o.floor_ugx <= currentBuyer.floor_ugx;
  const matches = (regionMatch ? 1 : 0) + (cropMatch ? 1 : 0) + (priceMatch ? 1 : 0);
  return { regionMatch, cropMatch, priceMatch, matches };
}

function renderOffers(offers) {
  if (!currentBuyer) return;
  const container = document.getElementById("offers-content");
  const summary = document.getElementById("market-summary");

  let filtered = offers.slice();
  if (filterState.region) filtered = filtered.filter(o => o.region === currentBuyer.region);
  if (filterState.crops)  filtered = filtered.filter(o => currentBuyer.crops.includes((o.crop || "").toLowerCase()));
  if (filterState.budget) filtered = filtered.filter(o => o.floor_ugx <= currentBuyer.floor_ugx);

  // Sort: full match > partial > none; then newest first.
  filtered.sort((a, b) => {
    const sa = scoreOffer(a).matches;
    const sb = scoreOffer(b).matches;
    if (sb !== sa) return sb - sa;
    return (b.created_at || 0) - (a.created_at || 0);
  });

  const matchCount = offers.filter(o => scoreOffer(o).matches === 3).length;
  summary.textContent = `${offers.length} listing${offers.length !== 1 ? 's' : ''} live · ${matchCount} full match${matchCount !== 1 ? 'es' : ''} for you`;

  if (filtered.length === 0) {
    container.innerHTML = '<div style="color:var(--muted); font-style:italic; padding:24px 0;">No listings match your current filters. Clear a chip to see more.</div>';
    return;
  }

  container.innerHTML = filtered.map(renderCard).join("");
}

function badgeFor(o) {
  if (o.payment_status === "settled") return '<span class="badge badge-settled">paid</span>';
  if (o.payment_status === "pending") return '<span class="badge badge-pending">payment pending</span>';
  const s = scoreOffer(o);
  if (s.matches === 3) return '<span class="badge badge-match">★ match</span>';
  if (s.matches === 2) return '<span class="badge badge-partial">~ partial</span>';
  return '';
}

function renderCard(o) {
  const s = scoreOffer(o);
  const total = o.kg * o.floor_ugx;
  const canPay = s.matches >= 2 && !o.payment_status;
  const payBtn = canPay
    ? `<button class="btn" style="background:var(--accent); border-color:var(--accent);" onclick="openPayPanel('${o.id}')">Pay UGX ${total.toLocaleString()}</button>`
    : (o.payment_status
        ? `<span style="font-size:11px; color:var(--muted);">Status: ${o.payment_status}</span>`
        : `<button class="btn" style="background:transparent; color:var(--ink);" disabled title="Mismatch on region/crop/price — adjust filters">View only</button>`);
  const chatBtn = `<button class="btn" style="background:transparent; color:var(--ink); margin-left:8px;" onclick="openChatForOffer('${o.farm_id}','${o.id}')">💬 Chat</button>`;
  return `
    <div class="offer-card" id="card-${o.id}">
      <div class="o-head">
        <div>
          <h3>${o.kg} kg of ${(o.crop || '').toUpperCase()} ${badgeFor(o)}</h3>
          <span style="font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted);">${o.id} · ${o.farmer_name} · ${o.region}</span>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'Fraunces',serif; font-size:24px; color:var(--accent);">UGX ${o.floor_ugx.toLocaleString()}</div>
          <span style="font-size:10px; color:var(--muted); text-transform:uppercase;">per kg · total ${total.toLocaleString()}</span>
        </div>
      </div>
      <div id="card-actions-${o.id}">${payBtn}${chatBtn}</div>
    </div>
  `;
}

function openPayPanel(offerId) {
  const actions = document.getElementById("card-actions-" + offerId);
  if (!actions) return;
  const default_msisdn = currentBuyer.contact || "+256";
  actions.innerHTML = `
    <div class="pay-panel">
      <label>Pay from your mobile-money number</label>
      <input id="msisdn-${offerId}" type="tel" value="${default_msisdn}" placeholder="+256..." />
      <div style="display:flex; gap:8px; margin-top:12px;">
        <button class="btn" style="background:var(--accent); border-color:var(--accent);" onclick="submitPayment('${offerId}')">Confirm payment</button>
        <button class="btn" style="background:transparent; color:var(--ink);" onclick="loadOffers()">Cancel</button>
      </div>
      <div class="pay-status" id="pay-status-${offerId}"></div>
    </div>
  `;
  document.getElementById("msisdn-" + offerId).focus();
}

async function submitPayment(offerId) {
  const input = document.getElementById("msisdn-" + offerId);
  const status = document.getElementById("pay-status-" + offerId);
  const msisdn = (input?.value || "").trim();
  if (!msisdn || msisdn.length < 6) { status.textContent = "Enter a valid mobile-money number."; return; }
  status.textContent = "Initiating Mavuno Pay…";
  const res = await jpost("/payments/initiate", {offer_id: offerId, msisdn, method: "mavuno-pay"});
  if (res.error) { status.textContent = "Failed: " + res.error; return; }
  status.textContent = `Payment ${res.payment_id} pending… awaiting mobile-money confirmation.`;
  pollPayment(res.payment_id, offerId, status);
}

async function pollPayment(paymentId, offerId, statusEl) {
  for (let i = 0; i < 20; i++) {
    await new Promise(r => setTimeout(r, 1500));
    const s = await jget("/payments/status/" + paymentId);
    if (s.error) { statusEl.textContent = "Status check failed: " + s.error; return; }
    if (s.status === "settled") {
      statusEl.innerHTML = `<strong style="color:var(--accent);">✓ Settled.</strong> UGX ${s.amount_ugx.toLocaleString()} sent. <a href="/payments/receipt/${paymentId}" target="_blank" style="color:var(--accent);">View signed receipt</a>`;
      toast("Payment settled — farmer notified.");
      setTimeout(loadOffers, 1200);
      return;
    }
    if (s.status === "failed") {
      statusEl.textContent = "✗ Payment failed. You can retry.";
      return;
    }
    statusEl.textContent = `Payment ${paymentId} pending… (check ${i+1}/20)`;
  }
  statusEl.innerHTML = `Still pending. <a href="javascript:void(0)" onclick="pollPayment('${paymentId}','${offerId}',this.parentElement)" style="color:var(--accent);">Retry status</a>`;
}

// ============================================================================
// CHAT drawer
// ============================================================================
let _chatActiveThread = null;
let _chatCursor = 0;
let _chatPumpAlive = false;

async function openChat(threadId) {
  const drawer = document.getElementById("chat-drawer");
  drawer.classList.add("open");
  drawer.setAttribute("aria-hidden", "false");
  if (threadId) return renderConvo(threadId);
  return renderInbox();
}

function closeChat() {
  const drawer = document.getElementById("chat-drawer");
  drawer.classList.remove("open");
  drawer.setAttribute("aria-hidden", "true");
  document.getElementById("chat-foot").style.display = "none";
  _chatPumpAlive = false;
  _chatActiveThread = null;
  refreshUnread();
}

async function openChatForOffer(farmId, offerId) {
  const res = await jpost("/chat/threads", {farm_id: farmId, offer_id: offerId});
  if (res.error) { toast("Chat failed: " + res.error); return; }
  openChat(res.id);
}

async function renderInbox() {
  document.getElementById("chat-title").textContent = "Messages";
  document.getElementById("chat-foot").style.display = "none";
  _chatPumpAlive = false;
  _chatActiveThread = null;
  const body = document.getElementById("chat-body");
  body.innerHTML = "<div style='color:var(--muted); font-size:12px;'>Loading threads…</div>";
  const res = await jget("/chat/threads");
  const threads = res.threads || [];
  if (threads.length === 0) {
    body.innerHTML = "<div style='color:var(--muted); font-size:13px; padding:12px;'>No conversations yet. Tap <strong>💬 Chat</strong> on any offer to start one.</div>";
    return;
  }
  body.innerHTML = threads.map(t => {
    const unread = t.unread > 0 ? `<span class="ct-unread">${t.unread}</span>` : "";
    const preview = t.last_preview ? escapeHtml(t.last_preview) : "<em style='color:var(--muted);'>No messages yet</em>";
    return `
      <div class="chat-thread-row" onclick="renderConvo('${t.id}')">
        <div class="ct-name">${escapeHtml(t.farmer_name || t.farm_id)}${unread}</div>
        <div class="ct-preview">${preview}</div>
        <div style="font-size:10px; color:var(--muted); margin-top:4px; font-family:'JetBrains Mono',monospace;">
          ${t.id}${t.offer_id ? ' · ' + t.offer_id : ''}
        </div>
      </div>
    `;
  }).join("");
}

async function renderConvo(threadId) {
  _chatActiveThread = threadId;
  _chatCursor = 0;
  _chatPumpAlive = true;
  document.getElementById("chat-title").textContent = "Conversation";
  document.getElementById("chat-foot").style.display = "flex";
  const body = document.getElementById("chat-body");
  body.innerHTML = `
    <button class="chat-back" onclick="renderInbox()">← Inbox</button>
    <div class="chat-convo-flex" id="chat-convo"></div>
  `;
  await pump();
  document.getElementById("chat-input").focus();
}

function renderBubble(m) {
  const mine = (m.sender_role === "buyer" && m.sender_id === buyerId);
  const klass = mine ? "chat-bubble chat-bubble-buyer" : "chat-bubble chat-bubble-farmer";
  const ts = new Date(m.created_at * 1000).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
  const who = mine ? "you" : (m.sender_role === "agent" ? "agent" : "farmer");
  return `<div class="${klass}">${escapeHtml(m.body)}<div class="b-meta">${who} · ${ts}</div></div>`;
}

async function pump() {
  while (_chatPumpAlive && _chatActiveThread) {
    const tid = _chatActiveThread;
    const res = await jget(`/chat/${tid}/messages?since=${_chatCursor}&wait=25`);
    if (!_chatPumpAlive || _chatActiveThread !== tid) return;
    if (res.error) { await new Promise(r => setTimeout(r, 2000)); continue; }
    const msgs = res.messages || [];
    if (msgs.length) {
      const flex = document.getElementById("chat-convo");
      if (flex) {
        flex.innerHTML += msgs.map(renderBubble).join("");
        flex.parentElement.scrollTop = flex.parentElement.scrollHeight;
      }
      _chatCursor = msgs[msgs.length - 1].created_at;
    }
  }
}

async function sendChat() {
  if (!_chatActiveThread) return;
  const input = document.getElementById("chat-input");
  const body = (input.value || "").trim();
  if (!body) return;
  input.value = "";
  const res = await jpost(`/chat/${_chatActiveThread}/messages`, {body});
  if (res.error) {
    toast(res.error === "too_many_messages" ? "Slow down — 1 message every 2 s." : "Send failed: " + res.error);
    input.value = body;
  }
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function refreshUnread() {
  const res = await jget("/chat/unread/count");
  if (res.error) return;
  const dot = document.getElementById("msg-unread");
  if (!dot) return;
  if (res.count > 0) { dot.classList.add("on"); dot.textContent = res.count; }
  else dot.classList.remove("on");
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeChat();
  if (e.key === "Enter" && !e.shiftKey && document.activeElement && document.activeElement.id === "chat-input") {
    e.preventDefault();
    sendChat();
  }
});

readFiltersFromUrl();
setInterval(loadOffers, 5000);
refreshUnread();
setInterval(refreshUnread, 15000);
</script>
